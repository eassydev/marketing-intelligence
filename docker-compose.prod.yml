# Production compose for the E2E VM: MIL app + co-located Redis.
# Postgres is external (Supabase now → E2E later) via DATABASE_URL in .env.production.
# Internal-only: the app port binds to MIL_BIND_IP (set it to the VM's PRIVATE VPC
# IP so the backend box can reach it; it is NOT exposed publicly). Defaults to
# localhost if unset.
#
# Multi-instance: set MIL_INSTANCE_NAME (default 'mil') to a unique value per clone
# so the container/image/volume names don't collide when several MIL instances run
# on one host. Pair it with a distinct MIL_QUEUE_PREFIX if they share one Redis.
services:
  mil:
    build: .
    image: ${MIL_INSTANCE_NAME:-mil}:latest
    container_name: ${MIL_INSTANCE_NAME:-mil}
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Override REDIS_URL to the compose service regardless of .env.production.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '${MIL_BIND_IP:-127.0.0.1}:5100:5100'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Cloudflare Tunnel sidecar: outbound-only path for the public touch beacon
  # (Cloudflare Worker → tunnel → mil:5100). No inbound port is opened on the VM
  # and no cloud SG change is needed. Configure the tunnel's public hostname in
  # the Cloudflare dashboard with an ingress PATH RULE exposing ONLY
  # /ingest/touch (catch-all → 404) so serving/admin routes stay private.
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env.production; the service is a no-op
  # crash-loop without it, so only enable alongside a real tunnel.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${MIL_INSTANCE_NAME:-mil}-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - mil

  redis:
    image: redis:7-alpine
    container_name: ${MIL_INSTANCE_NAME:-mil}-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - mil_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mil_redis:
    name: ${MIL_INSTANCE_NAME:-mil}_redis
